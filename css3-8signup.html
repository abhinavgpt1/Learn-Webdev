<html>

<head>
    <title>
        CSS3 - 8
    </title>
    <style>
        body {
            background-color: azure;
        }

        #signup-win {
            background-color: beige;
            width: 300px;
            height: 500px;
            padding: 10px;

            margin: auto;
            margin-top: 5%;
            border: 1px black solid;
        }
        #signup-win:hover{
        box-shadow: 0px 0px 10px gray;
        }

        #cross {
            background-image: url(pics/crossBtn2.png);
            background-repeat: no-repeat;
            height: 30px;
            width: 30px;
            float: right;
            background-color: red;
        }
        #signup-win img{
            box-shadow: 2px 2px 3px 2px gray;
        }
        input[type="text"],input[type="password"], input[type="number"]
        {
            width:100%;
            line-height:40px;
            text-align: center;
/*            background-color: aqua;*/
/*            border-radius:15px;*/
            outline: none;
            border: 1px black solid;
        }
        label{
            font-size:20px;
        }
        input[type="text"]:active{
            background-color: grey;
        }
        input[type="password"]:hover{
            background-color: palevioletred;
            background-image:url(pics/pwd.png); 
            background-repeat:no-repeat;
            background-position: left;
        }
        input[type="number"]:focus{
            background-color: grey;
        }
        .side-pic{
            background-image: url(pics/user.png);
            background-repeat: no-repeat;
/*            background-position:left;*/
            background-position:10px 10px;
            padding-left:20px;
        }
        .btn{
            padding:10px;
            width:100px;
            background-color: red;
            color:white;
            border:1px black solid;
            margin-top:15px;
/*            gives space between td and button*/
        }

    </style>
</head>

<body>
    <div id="signup-win">
        <table width="100%" border="0">
            <tr>
                <td>
                    <div id="cross"></div>
                </td>
            </tr>
            <tr>
                <td align="center">
                    <img src="pics/nopic.png" width="60" height="60">
                </td>
            </tr>
            <tr>
                <td>
                    <label>User ID</label>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="text" placeholder="Enter username" class="side-pic">
                </td>
            </tr>
             <tr>
                <td>
                    <label>Password</label>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="password" maxlength="10">
                </td>
            </tr>
            <tr>
                <td>
                    <label>Mobile</label>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="number" min="1000000000" max="10000000000">
                </td>
            </tr>
            <tr>
                <td align="center">
                    <input type="button" class="btn" value="SUBMIT">
                </td>
            </tr>
                    
                        

        </table>
    </div>
</body>

</html>
