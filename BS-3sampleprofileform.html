<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <script src="js/jquery-1.8.2.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <title>Sample profile form</title>
    <style>
        #errCoun{
            color: chartreuse;
        }
    </style>
</head>

<body style="background-color:darkseagreen">
    <!--    Profile header-->
    <div class="container" style="background-color:lightcoral">
        <div class="row bg-success">
            <div class="col-md-12">
                <center>
                    <h2>Profile Form</h2>
                </center>
            </div>
        </div>
        <!--Form-->
        <form action="">
            <div class="form-row">
                <!--           columns become tighter else use class="row"-->

                <!--email-->
                <div class="form-group col-md-4">
                    <label for="txtEmail">Email</label>
                    <input type="text" class="form-control" id="txtEmail">
                    <span id="errEmail">*</span>
                </div>

                <!--fetch button-->
                <div class="col-md-2 form-group">
                    <label for="">&nbsp;</label>
                    <div class="btn btn-success form-control" id="btnFetch">Fetch</div>
                </div>
                <!--name-->
                <div class="col-md-6 form-group">
                    <label for="txtName">Name</label>
                    <input type="text" id="txtName" class="form-control">
                    <span id="errName">*</span>
                </div>
            </div>
            <!--            address-->
            <div class="row">
                <div class="col-md-12 form-group">
                    <label for="txtAdd">Address</label>
                    <input type="text" id="txtAdd" class="form-control">
                    <span id="errAdd">*</span>
                </div>
            </div>
            <div class="row">
                <!--               country-->
                <div class="col-md-4 form-group">
                    <label for="txtCoun">Country</label>
                    <input type="text" id="txtCoun" class="form-control">
                    <span id="errCoun">*</span>
                </div>
                <!--                state-->
                <div class="col-md-4 form-group">
                    <label for="txtState">State/UT</label>
                    <input type="text" id="txtState" class="form-control">
                    <span id="errState">*</span>
                </div>
                <!--                city-->
                <div class="col-md-4 form-group">
                    <label for="txtCity">City</label>
                    <input type="text" id="txtCity" class="form-control">
                </div>
            </div>

            <!--            submit-->
            <div class="row">
                <div class="col-md-12">
                    <center>
                        <input type="button" id="btnSub" value="Submit" class="btn btn-primary" style="background-color:black">

                    </center>
                </div>
<!--                a space-->
                <div class="col-md-12">
                    <label for="">&nbsp;</label>
                </div>
            </div>
        </form>
    </div>


</body>

</html>
