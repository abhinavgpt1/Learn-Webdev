<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>signup</title>
    <script src="js/jquery-1.8.2.min.js"></script>
    <script>
        $(document).ready(function() {
            $("#btn").click(function() {
                $("#win").css("display", "block");
                $(this).hide(1000);
            });
            $("#cross").click(function() {
                $("#win").fadeOut(1000);
                $("#btn").slideDown();
                $("#txtId").val("");
                $("#txtPass").val("");
                $("#txtMob").val("");
                $("#txtMail").val("");
                $("#errId1").removeClass("ok").removeClass("not-ok");
                $("#errId2").html("*");
                $("#errPass1").removeClass("ok").removeClass("not-ok");
                $("#errPass2").html("*");
                $("#errMob1").removeClass("ok").removeClass("not-ok");
                $("#errMob2").html("*");
                $("#errMail1").removeClass("ok").removeClass("not-ok");
                $("#errMail2").html("*");
            });
            $("#txtId").blur(function() {
                var value = $(this).val();
                var r = /^[a-zA-Z ]*$/; //reg. expression
                var result = r.test(value);
                if (result == false) {
                    $("#errId2").html("Invalid name/username");
                    $("#errId1").removeClass("ok").addClass("not-ok");
                } else {

                    if (value == "") {
                        $("#errId2").html("Fill Details");
                        $("#errId1").removeClass("ok").addClass("not-ok");
                    } else {
                        $("#errId2").html("okay");
                        $("#errId1").removeClass("not-ok");
                        $("#errId1").addClass("ok");
                    }
                }
            });
            $("#txtPass").blur(function() {
                var value = $(this).val();
                var r = /(?=^.{8,10}$)(?=.*\d)(?=.*[!@#$%^&*]+)(?![.\n])(?=.*[A-Z])(?=.*[a-z]).*$/; //means 8 to 10 characters only
                //                var r = /(?=^.{8,}$)(?=.*\d)(?=.*[!@#$%^&*]+)(?![.\n])(?=.*[A-Z])(?=.*[a-z]).*$/;     //means 8 and above characters
                var result = r.test(value);
                var l = value.length;
                if (result == false) {
                    $("#errPass2").html("Fill password with min:8 , max:10 characters(digit,uppercase,special symbol and lowercase)");
                    $("#errPass1").removeClass("ok").addClass("not-ok");
                } else {
                    $("#errPass2").html("okay");
                    $("#errPass1").removeClass("not-ok").addClass("ok");
                }
            });
            $("#txtMob").blur(function() {
                var value = $(this).val();
                var r = /^[6-9]{1}[0-9]{9}$/; //reg. expression
                var result = r.test(value);
                if (result == false) {

                    $("#errMob2").html("Fill valid no.");
                    $("#errMob1").removeClass("ok").addClass("not-ok");
                } else {
                    $("#errMob2").html("okay");
                    $("#errMob1").removeClass("not-ok").addClass("ok");
                }
            });
            $("#txtMail").blur(function() {
                var value = $(this).val();
                var r=/^\w+@[a-zA-Z_]+?\.[a-zA-Z]{2,3}$/;
                var result = r.test(value);
                if (result == false) {

                    $("#errMail2").html("Fill valid mail id");
                    $("#errMail1").removeClass("ok").addClass("not-ok");
                } else {
                    $("#errMail2").html("okay");
                    $("#errMail1").removeClass("not-ok").addClass("ok");
                }
            });
            $("#btnlog").click(function() {
                var user = $("#errId2").html();
                var pass = $("#errPass2").html();
                var mob = $("#errMob2").html();
                var mail = $("#errMail2").html();
                
                if (user == "okay" && pass == "okay" && mob == "okay" && mail=="okay") 
                    alert("Login successful!!!");  
                else {
                    alert("Validate all credentials");
                }
            });
        });

    </script>
    <style>
        #btn,
        #btnlog {
            width: 70px;
            background-color: gainsboro;
            border: 2px black solid;
            padding: 5px;
            cursor: pointer;
            margin: 5px;
        }

        #win {
            margin-top: 30px;
            width: 300px;
            box-shadow: 0px 0px 1px 1px gray;
            display: none;
        }

        #cross {
            background-image: url(pics/closeico.png);
            background-size: contain;
            width: 30px;
            height: 30px;
            float: right;
            margin: 10px;
            cursor: pointer;
        }

        .ok {
            background-image: url(pics/ok.png);
            height: 25px;
            width: 25px;
            background-size: contain;
        }

        .not-ok {
            background-image: url(pics/not.png);
            height: 25px;
            width: 25px;
            background-size: contain;
        }

    </style>
</head>

<body>
    <center>
        <div id="btn">Sign In</div>

        <div id="win">
            <div id="cross"></div>
            <table width="100%" cellspacing="5">
                <tr>
                    <td>Username:</td>
                    <td><input type="text" id="txtId"></td>
                    <td>
                        <div id="errId1"></div>
                    </td>
                </tr>
                <tr>
                    <td colspan="3"><span id="errId2">*</span></td>
                </tr>

                <tr>
                    <td>Password:</td>
                    <td><input type="password" id="txtPass"></td>
                    <td>
                        <div id="errPass1"></div>
                    </td>

                </tr>
                <tr>
                    <td colspan="3"><span id="errPass2">*</span></td>
                </tr>
                <tr>
                    <td>Mobile No.</td>
                    <td><input type="number" id="txtMob"></td>
                    <td>
                        <div id="errMob1"></div>
                    </td>

                </tr>
                <tr>
                    <td colspan="3"><span id="errMob2">*</span></td>
                </tr>
                <tr>
                    <td>Email</td>
                    <td><input type="email" id="txtMail"></td>
                    <td>
                        <div id="errMail1"></div>
                    </td>

                </tr>
                <tr>
                    <td colspan="3"><span id="errMail2">*</span></td>
                </tr>
                <tr width="100%">
                    <td colspan="3" align="center"><input type="button" value="Log In" id="btnlog" style="width:30%; height:30px;"></td>
                </tr>

            </table>
        </div>

    </center>
</body>

</html>
